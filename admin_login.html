<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>DV Dream Homes Admin Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="static/css/admin_login.css">
</head>

<body>
    <div class="loading-screen" id="loadingScreen">
        <div class="loader"></div>
        <div class="loading-text">DV Dream Homes</div>
        <div class="loading-subtext">Bringing your vision to life...</div>
    </div>

    <div class="login-box">
        <form id="adminLoginForm" autocomplete="off">
            <div class="logo">DV</div>
            <h2>Admin Login</h2>
            <div class="error" id="loginError" role="alert" style="display:none;"></div>
            <div class="form-field">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required autofocus>
            </div>
            <div class="form-field">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required>
            </div>
            <button type="submit" class="btn-submit">Login</button>
        </form>
        <div class="back-link">
            <a href="index.html">&#8592; Back to Website</a>
        </div>
    </div>

    <script src="static/js/admin_login.js"></script>
</body>

</html>
