<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>DV Dream Homes Admin Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Bebas+Neue&family=DM+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <style>
        :root {
            --ink: #0b0b0b;
            --coal: #171717;
            --text: #2c2c2c;
            --muted: #686868;
            --line: rgba(11, 11, 11, 0.12);
            --white: #ffffff;
            --soft: #f6f6f3;
            --gold: #f5c400;
            --gold-soft: rgba(245, 196, 0, 0.18);
            --red: #c8102e;
            --font-display: "Cormorant Garamond", Georgia, serif;
            --font-head: "Bebas Neue", Impact, sans-serif;
            --font-body: "DM Sans", Arial, sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            width: 100%;
        }

        body {
            font-family: var(--font-body);
            background: linear-gradient(135deg, var(--soft) 0%, var(--white) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 1rem;
            color: var(--text);
        }

        .login-container {
            width: 100%;
            max-width: 420px;
            background: var(--white);
            border-radius: 12px;
            box-shadow: 0 18px 60px rgba(0, 0, 0, 0.14);
            overflow: hidden;
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .login-header {
            background: linear-gradient(135deg, var(--coal) 0%, var(--ink) 100%);
            padding: 3rem 2rem 2rem;
            text-align: center;
            border-bottom: 3px solid var(--gold);
        }

        .login-logo {
            font-size: 3rem;
            font-family: var(--font-head);
            color: var(--gold);
            font-weight: bold;
            margin-bottom: 0.5rem;
        }

        .login-title {
            font-size: 1.8rem;
            font-family: var(--font-display);
            color: var(--white);
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .login-subtitle {
            font-size: 0.95rem;
            color: rgba(255, 255, 255, 0.8);
            letter-spacing: 0.5px;
        }

        .login-form {
            padding: 2.5rem 2rem;
        }

        .form-group {
            margin-bottom: 1.8rem;
        }

        .form-group label {
            display: block;
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 0.6rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-group input {
            width: 100%;
            padding: 0.9rem 1.1rem;
            border: 2px solid var(--line);
            border-radius: 6px;
            font-size: 1rem;
            font-family: var(--font-body);
            color: var(--text);
            background: var(--soft);
            transition: all 0.3s ease;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--gold);
            background: var(--white);
            box-shadow: 0 0 0 3px var(--gold-soft);
        }

        .form-group input::placeholder {
            color: var(--muted);
        }

        .error-message {
            display: none;
            padding: 1rem;
            margin-bottom: 1.5rem;
            background: rgba(200, 16, 46, 0.1);
            border-left: 4px solid var(--red);
            border-radius: 4px;
            color: var(--red);
            font-size: 0.95rem;
            animation: slideDown 0.3s ease;
        }

        .error-message.show {
            display: block;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .submit-btn {
            width: 100%;
            padding: 0.95rem 1.5rem;
            background: linear-gradient(135deg, var(--coal) 0%, var(--ink) 100%);
            color: var(--white);
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15);
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        .submit-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .submit-btn .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: var(--white);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 0.5rem;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .login-footer {
            padding: 1.5rem 2rem;
            text-align: center;
            border-top: 1px solid var(--line);
            background: var(--soft);
        }

        .back-link {
            display: inline-block;
        }

        .back-link a {
            color: var(--text);
            font-size: 0.95rem;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.3s ease;
            border-bottom: 2px solid transparent;
        }

        .back-link a:hover {
            color: var(--gold);
            border-bottom-color: var(--gold);
        }

        @media (max-width: 480px) {
            .login-container {
                border-radius: 0;
                box-shadow: none;
            }

            .login-header {
                padding: 2rem 1.5rem 1.5rem;
            }

            .login-logo {
                font-size: 2.5rem;
            }

            .login-title {
                font-size: 1.4rem;
            }

            .login-form {
                padding: 2rem 1.5rem;
            }

            .form-group {
                margin-bottom: 1.5rem;
            }

            .form-group input {
                padding: 0.85rem 1rem;
                font-size: 16px;
            }
        }
    </style>
</head>

<body>
    <div class="login-container">
        <div class="login-header">
            <div class="login-logo">DV</div>
            <h1 class="login-title">Admin Portal</h1>
            <p class="login-subtitle">Manage Your Dream Homes</p>
        </div>

        <form id="adminLoginForm" class="login-form" autocomplete="off">
            <div class="error-message" id="loginError" role="alert"></div>

            <div class="form-group">
                <label for="username"><i class="fas fa-user"></i> Username</label>
                <input type="text" id="username" name="username" required autofocus placeholder="Enter your username">
            </div>

            <div class="form-group">
                <label for="password"><i class="fas fa-lock"></i> Password</label>
                <input type="password" id="password" name="password" required placeholder="Enter your password">
            </div>

            <button type="submit" class="submit-btn" id="submitBtn">
                <span id="btnText">Login to Dashboard</span>
            </button>
        </form>

        <div class="login-footer">
            <div class="back-link">
                <a href="index.html">
                    <i class="fas fa-arrow-left"></i>
                    Back to Website
                </a>
            </div>
        </div>
    </div>

    <script>
        const form = document.getElementById('adminLoginForm');
        const usernameInput = document.getElementById('username');
        const passwordInput = document.getElementById('password');
        const errorDiv = document.getElementById('loginError');
        const submitBtn = document.getElementById('submitBtn');
        const btnText = document.getElementById('btnText');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorDiv.classList.remove('show');
            errorDiv.textContent = '';

            const username = usernameInput.value.trim();
            const password = passwordInput.value;

            if (!username || !password) {
                errorDiv.textContent = 'Please enter both username and password';
                errorDiv.classList.add('show');
                return;
            }

            submitBtn.disabled = true;
            btnText.innerHTML = '<span class="spinner"></span>Logging in...';

            try {
                const response = await fetch('/api/admin/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (response.ok) {
                    localStorage.setItem('dv_admin_user', username);
                    window.location.href = '/admin_dashboard.html';
                } else {
                    throw new Error(data.error || 'Login failed');
                }
            } catch (error) {
                errorDiv.textContent = error.message || 'An error occurred. Please try again.';
                errorDiv.classList.add('show');
            } finally {
                submitBtn.disabled = false;
                btnText.textContent = 'Login to Dashboard';
            }
        });
    </script>
</body>

</html>
